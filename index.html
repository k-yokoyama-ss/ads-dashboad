<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>広告案件ダッシュボード</title>
<style>
  #pw-screen{position:fixed;inset:0;background:#F6F5F1;display:flex;align-items:center;justify-content:center;z-index:9999;}
  #pw-screen.hidden{display:none;}
  .pw-box{background:#fff;border:1px solid #E4E2DA;border-radius:12px;padding:36px 32px;width:320px;text-align:center;}
  .pw-box h2{font-size:16px;font-weight:700;margin:0 0 6px;color:#1F1E1B;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;}
  .pw-box p{font-size:13px;color:#6B6960;margin:0 0 20px;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;}
  .pw-box input{width:100%;padding:10px 12px;border:1px solid #E4E2DA;border-radius:8px;font-size:15px;font-family:inherit;background:#F6F5F1;margin-bottom:10px;text-align:center;letter-spacing:.2em;box-sizing:border-box;}
  .pw-box input:focus{outline:none;border-color:#1F5F4F;}
  .pw-box button{width:100%;padding:10px;background:#1F5F4F;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;cursor:pointer;}
  .pw-box button:hover{background:#17503F;}
  .pw-error{font-size:12px;color:#A23B2E;margin:8px 0 0;display:none;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;}
  :root{--bg:#F6F5F1;--card:#FFFFFF;--line:#E4E2DA;--ink:#1F1E1B;--sub:#6B6960;--faint:#A6A399;--accent:#1F5F4F;--accent-bg:#E4EFEB;--warn:#B5651D;--warn-bg:#F8EBDD;--danger:#A23B2E;--danger-bg:#F7E6E2;--done-bg:#EFEEE9;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;padding:32px 24px 80px;}
  .wrap{max-width:1200px;margin:0 auto;}
  header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  h1{font-size:22px;font-weight:700;margin:0;}
  .updated{font-size:12px;color:var(--sub);}
  .toolbar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .btn{font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;font-weight:700;}
  .btn:hover{background:var(--bg);}
  .btn-text{border:none;background:none;color:var(--sub);font-weight:400;padding:8px 4px;}
  .view-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .view-tab{font-size:13px;padding:7px 16px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--sub);cursor:pointer;}
  .view-tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .summary{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
  .stat .label{font-size:12px;color:var(--sub);margin:0 0 6px;}
  .stat .value{font-size:22px;font-weight:700;margin:0;}
  .filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .filter-btn{font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--sub);cursor:pointer;}
  .filter-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .list{display:flex;flex-direction:column;gap:10px;}
  .campaign{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px 8px;}
  .campaign-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
  .campaign-head .name{font-size:16px;font-weight:700;margin:0;}
  .campaign-head .total{font-size:13px;color:var(--sub);}
  .campaign-head .total b{color:var(--ink);font-size:14px;}
  .row{display:grid;grid-template-columns:120px 1fr 100px 120px;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row.done{opacity:.5;}
  .badge{font-size:11px;padding:3px 9px;border-radius:5px;background:var(--accent-bg);color:var(--accent);font-weight:700;justify-self:start;}
  .badge-instagram{background:#F0997B;color:#4A1B0C;}
  .badge-youtube{background:#E24B4A;color:#FCEBEB;}
  .badge-x{background:#7F77DD;color:#EEEDFE;}
  .badge-facebook{background:#378ADD;color:#E6F1FB;}
  .badge-tiktok{background:#1D9E75;color:#E1F5EE;}
  .badge-google{background:#EF9F27;color:#412402;}
  .badge-line{background:#06C755;color:#F0FFF4;}
  .badge-yda{background:#FF6B35;color:#FFF0EB;}
  .badge-other{background:#888780;color:#F1EFE8;}
  .range{font-size:13px;font-weight:700;letter-spacing:.1px;white-space:normal;line-height:1.5;}
  .range .arrow{color:var(--faint);margin:0 3px;font-weight:400;}
  .days-left{font-size:12px;padding:2px 8px;border-radius:6px;justify-self:start;}
  .row-budget{font-size:14px;font-weight:700;text-align:right;}
  input[type=checkbox]{width:18px;height:18px;justify-self:center;}
  .row.status-active .days-left{background:var(--accent-bg);color:var(--accent);}
  .row.status-over .days-left{background:var(--danger-bg);color:var(--danger);}
  .row.status-done .days-left{background:var(--done-bg);color:var(--sub);}
  .empty{text-align:center;color:var(--sub);font-size:13px;padding:40px 0;}

  /* カレンダー */
  .cal-wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .cal-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:2px solid var(--line);}
  .cal-dow{text-align:center;padding:12px 0;font-size:13px;font-weight:700;color:var(--sub);}
  .cal-dow.sun{color:var(--danger);}
  .cal-dow.sat{color:var(--accent);}
  .cal-week{border-bottom:1px solid var(--line);}
  .cal-week:last-child{border-bottom:none;}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr);}
  .cal-day{padding:10px 8px 6px;min-height:80px;border-right:1px solid #F0EFEB;}
  .cal-day:last-child{border-right:none;}
  .cal-day-num{font-size:14px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:500;}
  .cal-day-num.today{background:var(--accent);color:#fff;font-weight:700;}
  .cal-day-num.sun{color:var(--danger);}
  .cal-day-num.sat{color:var(--accent);}
  .cal-day-num.other{color:var(--faint);}
  .cal-bars{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 0 12px;gap:3px 0;}
  .cal-bar{height:26px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;}
  .cal-bar.bar-start{border-radius:6px 0 0 6px;margin-left:4px;cursor:pointer;}
  .cal-bar.bar-end{border-radius:0 6px 6px 0;margin-right:4px;}
  .cal-bar.bar-single{border-radius:6px;margin:0 4px;cursor:pointer;}
  .cal-bar.bar-mid{border-radius:0;}
  .cal-bar.bar-week-start{border-radius:0;margin-left:0;cursor:pointer;}
  .cal-bar.bar-week-end{border-radius:0;margin-right:0;}
  .cal-bar.bar-week-start.bar-end{border-radius:0 6px 6px 0;margin-right:4px;}
  .cal-bar.bar-start.bar-week-end{border-radius:6px 0 0 6px;margin-left:4px;}
  .cal-bar.bar-empty{background:transparent!important;}

  .cal-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:none;align-items:center;justify-content:center;z-index:100;}
  .cal-popup-overlay.open{display:flex;}
  .cal-popup{background:var(--card);border-radius:14px;padding:24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
  .cal-popup-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
  .cal-popup-name{font-size:16px;font-weight:700;margin:0;flex:1;}
  .cal-popup-close{border:none;background:none;font-size:20px;color:var(--faint);cursor:pointer;padding:0 0 0 12px;line-height:1;}
  .cal-popup-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .cal-popup-row:last-child{border-bottom:none;}
  .cal-popup-label{color:var(--sub);}
  .cal-popup-value{font-weight:700;text-align:right;}
  .cal-legend{display:flex;gap:16px;padding:12px 16px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--line);background:var(--bg);}
  .cal-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);}
  .cal-legend-dot{width:12px;height:12px;border-radius:3px;}

  .date-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:none;align-items:center;justify-content:center;z-index:200;}
  .date-popup-overlay.open{display:flex;}
  .date-popup{background:var(--card);border-radius:14px;padding:24px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
  .date-popup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:12px;}
  .date-popup-title{font-size:15px;font-weight:700;margin:0;}
  .date-popup-close{border:none;background:none;font-size:20px;color:var(--faint);cursor:pointer;padding:0;}
  .date-popup-empty{font-size:13px;color:var(--sub);padding:12px 0;}
  .status-campaign{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--line);}
  .status-campaign:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .status-campaign-name{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .status-checks{display:flex;flex-direction:column;gap:6px;}
  .status-check{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg);cursor:pointer;}
  .status-check:hover{background:var(--accent-bg);}
  .status-check input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}
  .status-check label{font-size:13px;cursor:pointer;flex:1;}
  .status-check.checked{background:var(--accent-bg);}
  .status-check.checked label{color:var(--accent);font-weight:700;}
  .sokcho-date-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:var(--bg);margin-top:4px;}
  .sokcho-date-row label{font-size:12px;color:var(--sub);white-space:nowrap;}
  .sokcho-date-row input[type=date]{border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:12px;font-family:inherit;background:var(--card);color:var(--ink);flex:1;}
  .sokcho-date-row button{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--line);background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap;}
  .deadline-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin:1px 2px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
  .deadline-badge.sokcho{background:#FEF3C7;color:#92400E;}
  .deadline-badge.report{background:#DBEAFE;color:#1E40AF;}
  .deadline-badge.seikyusho{background:#FCE7F3;color:#9D174D;}
  .deadline-badge.done{opacity:0.4;text-decoration:line-through;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;padding:20px;z-index:10;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card);border-radius:12px;padding:24px;width:100%;max-width:420px;}
  .modal h2{font-size:16px;margin:0 0 18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--sub);margin-bottom:5px;}
  .field input,.field select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  @media(max-width:640px){.row{grid-template-columns:1fr;gap:6px;}.row-budget{text-align:left;}.range{font-size:15px;}.summary{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-box">
    <h2>広告案件ダッシュボード</h2>
    <p>パスワードを入力してください</p>
    <input type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password">
    <button onclick="checkPassword()">ログイン</button>
    <p class="pw-error" id="pw-error">パスワードが違います</p>
  </div>
</div>

<script>
(function(){
  // パスワードを変更する場合は以下のハッシュ値を更新してください
  // ハッシュ値の生成方法: https://emn178.github.io/online-tools/sha256.html でパスワードを入力
  const PASSWORD_HASH = "2a95e2ef9e4d24f0b8925c98881c05cd71927bb8ca794d1a5857ee33ed79ffc0";
  const KEY = "ad_dashboard_auth_v1";

  async function hashPassword(pw){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }

  if(sessionStorage.getItem(KEY)==="ok") document.getElementById("pw-screen").classList.add("hidden");

  window.checkPassword = async function(){
    const val = document.getElementById("pw-input").value;
    const hashed = await hashPassword(val);
    if(hashed === PASSWORD_HASH){
      sessionStorage.setItem(KEY,"ok");
      document.getElementById("pw-screen").classList.add("hidden");
    } else {
      document.getElementById("pw-error").style.display="block";
      document.getElementById("pw-input").value="";
      document.getElementById("pw-input").focus();
    }
  };

  document.getElementById("pw-input").addEventListener("keydown", function(e){
    if(e.key==="Enter") window.checkPassword();
  });
})();
</script>

<div class="wrap">
  <header>
    <h1>広告案件ダッシュボード</h1>
    <div class="updated" id="updatedAt"></div>
  </header>

  <div class="toolbar">
    <button class="btn btn-text" id="refreshSheetBtn" style="display:none;">↻ スプレッドシートを更新</button>
    <button class="btn btn-text" id="openCsvBtn">スプレッドシート連携の設定</button>
  </div>

  <div class="summary">
    <div class="stat"><p class="label">案件数</p><p class="value" id="statTotal">-</p></div>
    <div class="stat"><p class="label">媒体費合計</p><p class="value" id="statBudget">-</p></div>
    <div class="stat"><p class="label">請求額合計</p><p class="value" id="statBilling">-</p></div>
    <div class="stat"><p class="label">配信中</p><p class="value" id="statActive">-</p></div>
    <div class="stat"><p class="label">開始前</p><p class="value" id="statUpcoming">-</p></div>
  </div>

  <div class="view-tabs">
    <button class="view-tab active" id="tabList">一覧</button>
    <button class="view-tab" id="tabCal">カレンダー</button>
  </div>

  <!-- 一覧ビュー -->
  <div id="listView">

      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">配信中</button>

  <div id="calView" style="display:none;">

        <button class="btn" id="calPrev">‹</button>
        <span style="font-size:16px;font-weight:700;" id="calTitle"></span>

    <div class="cal-wrap">
      <div class="cal-header">
        <div class="cal-dow sun">日</div>
        <div class="cal-dow">月</div>
        <div class="cal-dow">火</div>
        <div class="cal-dow">水</div>
        <div class="cal-dow">木</div>
        <div class="cal-dow">金</div>
        <div class="cal-dow sat">土</div>
      </div>
      <div id="calBody"></div>
      <div class="cal-legend" id="calLegend"></div>
    </div>
  </div>
</div>

<div class="date-popup-overlay" id="datePopupOverlay">
  <div class="date-popup">
    <div class="date-popup-header">
      <p class="date-popup-title" id="datePopupTitle"></p>
      <button class="date-popup-close" id="datePopupClose">✕</button>
    </div>
    <div id="datePopupContent"></div>
  </div>
</div>

<div class="cal-popup-overlay" id="calPopupOverlay">
  <div class="cal-popup">
    <div class="cal-popup-header">
      <p class="cal-popup-name" id="calPopupName"></p>
      <button class="cal-popup-close" id="calPopupClose">✕</button>
    </div>
    <div class="cal-popup-row"><span class="cal-popup-label">媒体</span><span class="cal-popup-value" id="calPopupMedia"></span></div>
    <div class="cal-popup-row"><span class="cal-popup-label">配信期間</span><span class="cal-popup-value" id="calPopupPeriod"></span></div>
    <div class="cal-popup-row"><span class="cal-popup-label">請求額</span><span class="cal-popup-value" id="calPopupBilling"></span></div>
    <div class="cal-popup-row"><span class="cal-popup-label">媒体費</span><span class="cal-popup-value" id="calPopupBudget"></span></div>
    <div class="cal-popup-row"><span class="cal-popup-label">手数料</span><span class="cal-popup-value" id="calPopupFee"></span></div>

<div class="modal-overlay" id="csvOverlay">
  <div class="modal">
    <h2>スプレッドシート連携の設定</h2>
    <div class="field">
      <label>公開済みCSVリンク（ファイル＞共有＞ウェブに公開）</label>
      <input type="text" id="csvUrlInput" placeholder="https://docs.google.com/.../pub?output=csv">
    </div>
    <p style="font-size:12px;color:var(--sub);margin:0 0 4px;">保存すると、次回から自動で読み込みます。</p>
    <div class="modal-actions">
      <button class="btn" id="clearCsvUrlBtn" style="color:var(--danger);margin-right:auto;">連携を解除</button>
      <button class="btn" id="cancelCsvBtn">キャンセル</button>
      <button class="btn" style="background:var(--ink);color:#fff;border-color:var(--ink);" id="loadCsvBtn">保存して読み込む</button>
    </div>
  </div>
</div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbzJYgNThd8aoeTvduDpmCo840ySZnt_m4n5JFeWpk8LR3u4uCTU93jzz6g_HOzpqT_ywg/exec";
let statusData={};
const STORAGE_KEY="ad_dashboard_campaigns_v1";
const SHEET_URL_KEY="ad_dashboard_sheet_url_v1";
const WEEKDAYS=["日","月","火","水","木","金","土"];
let data=[];
let currentFilter="all";
let currentView="list";
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();

function loadData(){
  try{const raw=localStorage.getItem(STORAGE_KEY);data=raw?JSON.parse(raw):[];}
  catch(e){data=[];}
}
function saveData(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}
}

function fmtDate(d,time){
  const dt=new Date(d+"T00:00:00");
  const base=(dt.getMonth()+1)+"/"+dt.getDate()+"("+WEEKDAYS[dt.getDay()]+")";
  return time?base+" "+time:base;
}

function parseDate(str){
  if(!str)return"";
  str=str.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(str))return str;
  const parts=str.split(/[\/\-]/);
  if(parts.length===3){
    if(parts[0].length===4)return`${parts[0]}-${parts[1].padStart(2,"0")}-${parts[2].padStart(2,"0")}`;
    if(parts[2].length===4)return`${parts[2]}-${parts[0].padStart(2,"0")}-${parts[1].padStart(2,"0")}`;
  }
  return str;
}

function statusOf(item,today){
  const start=new Date(item.start+"T00:00:00");
  const end=new Date(item.end+"T23:59:59");
  if(today>end)return"done";
  if(today<start)return"upcoming";
  return"active";
}
function statusLabel(status,item,today){
  if(status==="done")return"配信完了";
  if(status==="upcoming"){const d=Math.ceil((new Date(item.start+"T00:00:00")-today)/86400000);return`開始まであと${d}日`;}
  const end=new Date(item.end+"T23:59:59");
  const d=Math.ceil((end-today)/86400000);
  return d<=0?"本日まで":`残り${d}日`;
}
function mediaBadgeClass(media){
  const m=media.toLowerCase();
  if(m.includes("instagram")||m==="ig")return"badge-instagram";
  if(m.includes("youtube")||m==="yt")return"badge-youtube";
  if(m.includes("x")||m.includes("twitter"))return"badge-x";
  if(m.includes("facebook")||m==="fb")return"badge-facebook";
  if(m.includes("tiktok"))return"badge-tiktok";
  if(m.includes("google")||m==="gdn")return"badge-google";
  if(m.includes("line"))return"badge-line";
  if(m.includes("yda"))return"badge-yda";
  return"badge-other";
}
function mediaColor(media){
  const m=media.toLowerCase();
  if(m.includes("instagram")||m==="ig")return["#F0997B","#4A1B0C"];
  if(m.includes("youtube")||m==="yt")return["#E24B4A","#FCEBEB"];
  if(m.includes("x")||m.includes("twitter"))return["#7F77DD","#EEEDFE"];
  if(m.includes("facebook")||m==="fb")return["#378ADD","#E6F1FB"];
  if(m.includes("tiktok"))return["#1D9E75","#E1F5EE"];
  if(m.includes("google")||m==="gdn")return["#EF9F27","#412402"];
  if(m.includes("line"))return["#06C755","#F0FFF4"];
  if(m.includes("yda"))return["#FF6B35","#FFF0EB"];
  return["#888780","#F1EFE8"];
}

function groupByCampaign(list){

function render(){
  const today=new Date();today.setHours(0,0,0,0);
  let totalRows=0,budgetSum=0,billingSum=0,activeCount=0,upcomingCount=0;
  data.forEach(item=>{
    const s=statusOf(item,today);
    if(s==="active")activeCount++;
    if(s==="upcoming")upcomingCount++;
    budgetSum+=item.budget||0;
    billingSum+=(item.gross||item.budget||0);
    totalRows++;
  });
  document.getElementById("statTotal").textContent=totalRows+"件";
  document.getElementById("statBudget").textContent="¥"+budgetSum.toLocaleString();
  document.getElementById("statBilling").textContent="¥"+billingSum.toLocaleString();
  document.getElementById("statActive").textContent=activeCount+"件";
  document.getElementById("statUpcoming").textContent=upcomingCount+"件";

  const list=document.getElementById("list");
  list.innerHTML="";
  const groups=groupByCampaign(data);
  let visible=0;

  Object.keys(groups).forEach(name=>{
    const rows=groups[name].map(item=>({item,status:statusOf(item,today)}));

    if(!filtered.length)return;
    visible++;
    const campaignTotal=groups[name].reduce((s,i)=>s+(i.gross||i.budget||0),0);
    const earliestStart=groups[name].reduce((min,i)=>new Date(i.start)<new Date(min)?i.start:min,groups[name][0].start);
    const latestEnd=groups[name].reduce((max,i)=>new Date(i.end)>new Date(max)?i.end:max,groups[name][0].end);
    const card=document.createElement("div");
    card.className="campaign";
    card.innerHTML=`<div class="campaign-head"><p class="name">${name}</p><div class="total">全体期間 ${fmtDate(earliestStart)} 〜 ${fmtDate(latestEnd)} ・ 合計 <b>¥${campaignTotal.toLocaleString()}</b></div></div>`;
    filtered.sort((a,b)=>new Date(a.item.end)-new Date(b.item.end)).forEach(({item,status})=>{
      const row=document.createElement("div");
      row.className="row status-"+status+(item.done?" done":"");
      row.innerHTML=`
        <span class="badge ${mediaBadgeClass(item.media)}">${item.media}</span>
        <div class="range">${fmtDate(item.start,item.startTime)}<span class="arrow">→</span>${fmtDate(item.end,item.endTime)}</div>
        <div class="days-left">${statusLabel(status,item,today)}</div>
        <div class="row-budget">¥${(item.gross||item.budget||0).toLocaleString()}<div style="font-size:11px;color:var(--sub);font-weight:400;">媒体費 ¥${(item.budget||0).toLocaleString()}${item.gross?` ・ 手数料 ¥${(item.gross-item.budget).toLocaleString()}`:""}</div></div>
      `;
      card.appendChild(row);
    });
    list.appendChild(card);
  });
  document.getElementById("emptyMsg").style.display=visible?"none":"block";
}

function renderCalendar(){
  const today=new Date();today.setHours(0,0,0,0);
  document.getElementById("calTitle").textContent=calYear+"年"+(calMonth+1)+"月";
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const body=document.getElementById("calBody");
  body.innerHTML="";

  const cells=[];
  for(let i=firstDay-1;i>=0;i--)cells.push({d:prevDays-i,cur:false});
  for(let d=1;d<=daysInMonth;d++)cells.push({d,cur:true});
  while(cells.length%7!==0)cells.push({d:cells.length-firstDay-daysInMonth+1,cur:false});

  const weeks=[];
  for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));

  weeks.forEach(week=>{
    const weekDiv=document.createElement("div");
    weekDiv.className="cal-week";

    const daysDiv=document.createElement("div");
    daysDiv.className="cal-days";
    week.forEach((cell,di)=>{
      const d=document.createElement("div");
      d.className="cal-day";
      if(cell.cur){
        const dt=new Date(calYear,calMonth,cell.d);
        const isToday=dt.getTime()===today.getTime();
        let cls="cal-day-num"+(isToday?" today":di===0?" sun":di===6?" sat":"");
        const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(cell.d).padStart(2,'0')}`;
        const dayLabel=`${calMonth+1}/${cell.d}(${WEEKDAYS[dt.getDay()]})`;
        d.innerHTML=`<span class="${cls}" style="cursor:pointer;" data-date="${dateStr}" data-label="${dayLabel}">${cell.d}</span>`;
        d.querySelector("span").addEventListener("click",()=>openDatePopup(dateStr,dayLabel));
      } else {
        d.innerHTML=`<span class="cal-day-num other">${cell.d}</span>`;
      }
      daysDiv.appendChild(d);
    });
    weekDiv.appendChild(daysDiv);

    const barsDiv=document.createElement("div");
    barsDiv.className="cal-bars";
    const weekDates=week.map(cell=>{
      if(!cell.cur)return null;
      return new Date(calYear,calMonth,cell.d);
    });
    const weekStart=weekDates.find(d=>d);
    const weekEnd=[...weekDates].reverse().find(d=>d);

    data.forEach(item=>{
      if(!item.start||!item.end)return;
      const s=new Date(item.start+"T00:00:00");
      const e=new Date(item.end+"T23:59:59");
      if(!weekStart||!weekEnd)return;
      if(s>weekEnd||e<weekStart)return;

      const [bgColor,textColor]=mediaColor(item.media);

      week.forEach((cell,di)=>{
        const cellDate=cell.cur?new Date(calYear,calMonth,cell.d):null;
        const wrapper=document.createElement("div");
        if(cellDate&&cellDate>=s&&cellDate<=e){
          const cellStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(cell.d).padStart(2,'0')}`;
          const isActualStart=cellStr===item.start;
          const isActualEnd=cellStr===item.end;
          const isWeekStart=di===0;
          const isWeekEnd=di===6||(cell.cur&&cell.d===daysInMonth);

          let cls="cal-bar";
          if(isActualStart&&isActualEnd){
            cls+=" bar-single";
          } else if(isActualStart){
            cls+=isWeekEnd?" bar-start bar-week-end":" bar-start";
          } else if(isActualEnd){
            cls+=isWeekStart?" bar-week-start bar-end":" bar-end";
          } else if(isWeekStart){
            cls+=isWeekEnd?" bar-mid":" bar-week-start";
          } else if(isWeekEnd){
            cls+=" bar-week-end";
          } else {
            cls+=" bar-mid";
          }
          wrapper.className=cls;
          wrapper.style.background=bgColor;
          wrapper.style.color=textColor;
          if(isActualStart||isWeekStart){
            wrapper.textContent=item.name;
          }
          if(isActualStart||isWeekStart){
            wrapper.addEventListener("click",()=>openCalPopup(item));
          }
        } else {
          wrapper.className="cal-bar bar-empty";
        }
        barsDiv.appendChild(wrapper);
      });
    });
    weekDiv.appendChild(barsDiv);

    // 期限バッジ
    const badgeDiv = document.createElement("div");
    badgeDiv.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);padding:2px 0 6px;";
    week.forEach((cell, di) => {
      const cell_div = document.createElement("div");
      cell_div.style.cssText="padding:0 2px;min-height:4px;";
      if(cell.cur){
        const cellStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(cell.d).padStart(2,'0')}`;
        // 速報値（媒体ごと）
        data.forEach(item=>{
          getDeadlines(item).forEach(dl=>{
            if(dl.date===cellStr){
              const badge=document.createElement("div");
              badge.className=`deadline-badge ${dl.type}${dl.done?" done":""}`;
              badge.textContent=`${item.name}（${item.media}） ${dl.label}`;
              cell_div.appendChild(badge);
            }
          });
        });
        // レポート・請求書（案件ごと・重複除去）
        const seen=new Set();
        data.forEach(item=>{
          if(seen.has(item.name)) return;
          getCampaignDeadlines(item.name).forEach(dl=>{
            if(dl.date===cellStr){
              seen.add(item.name);
              const badge=document.createElement("div");
              badge.className=`deadline-badge ${dl.type}${dl.done?" done":""}`;
              badge.textContent=`${item.name} ${dl.label}`;
              cell_div.appendChild(badge);
            }
          });
        });
      }
      badgeDiv.appendChild(cell_div);
    });
    weekDiv.appendChild(badgeDiv);
    body.appendChild(weekDiv);
  });

  const usedMedia=[...new Set(data.map(d=>d.media))];
  const legend=document.getElementById("calLegend");
  legend.innerHTML="";
  usedMedia.forEach(media=>{
    const [bg]=mediaColor(media);
    legend.innerHTML+=`<div class="cal-legend-item"><span class="cal-legend-dot" style="background:${bg}"></span>${media}</div>`;
  });
}

function addBusinessDays(dateStr, days){
  const d = new Date(dateStr+"T00:00:00");
  let count = 0;
  while(count < days){
    d.setDate(d.getDate()+1);
    const dow = d.getDay();
    if(dow !== 0 && dow !== 6) count++;
  }
  return d.toISOString().slice(0,10);
}

function statusKey(item){ return item.name+"|"+item.media; }
function campaignKey(name){ return name+"|_campaign"; }

function getDeadlines(item){
  const key = statusKey(item);
  const st = statusData[key] || {};
  const deadlines = [];
  if(item.end){
    deadlines.push({type:"sokcho", label:"速報値", field:"sokuchoDate", date:st.sokuchoDate||"", done:!!st.sokuhochi, key});
  }
  return deadlines;
}

function getCampaignDeadlines(name){
  const ckey = campaignKey(name);
  const st = statusData[ckey] || {};
  // 案件の最終終了日を取得
  const items = data.filter(d=>d.name===name);
  const latestEnd = items.reduce((max,i)=>i.end>max?i.end:max, items[0]?.end||"");
  const deadlines = [];
  if(latestEnd){
    const autoReport = new Date(latestEnd+"T00:00:00");
    autoReport.setDate(autoReport.getDate()+7);
    const autoSeikyu = addBusinessDays(latestEnd,3);
    deadlines.push({type:"report",    label:"レポート",   field:"reportDate",    date:st.reportDate||autoReport.toISOString().slice(0,10), done:!!st.report,    key:ckey});
    deadlines.push({type:"seikyusho", label:"請求書提出", field:"seikyushoDate", date:st.seikyushoDate||autoSeikyu, done:!!st.seikyusho, key:ckey});
  }
  return deadlines;
}

function openDatePopup(dateStr,dayLabel){
  const target=new Date(dateStr+"T00:00:00");
  const items=data.filter(item=>{
    if(!item.start||!item.end)return false;
    const s=new Date(item.start+"T00:00:00");
    const e=new Date(item.end+"T23:59:59");
    return target>=s&&target<=e;
  });

  document.getElementById("datePopupTitle").textContent=dayLabel+"の配信案件";
  const content=document.getElementById("datePopupContent");
  content.innerHTML="";

  if(!items.length){
    content.innerHTML=`<p class="date-popup-empty">この日に配信中の案件はありません</p>`;
    document.getElementById("datePopupOverlay").classList.add("open");
    return;
  }

  // 案件名でグループ化
  const groups={};
  items.forEach(item=>{
    if(!groups[item.name])groups[item.name]=[];
    groups[item.name].push(item);
  });

  Object.keys(groups).forEach(name=>{
    const div=document.createElement("div");
    div.className="status-campaign";
    div.innerHTML=`<div class="status-campaign-name">${name}</div>`;

    // レポート・請求書（案件単位）
    const campDeadlines = getCampaignDeadlines(name);

      const pickerDiv=document.createElement("div");
      pickerDiv.className="sokcho-date-row";
      const inputId=`date-${dl.field}-${dl.key.replace(/[^a-zA-Z0-9]/g,'_')}`;
      const icon=dl.type==="report"?"📄":"🧾";
      pickerDiv.innerHTML=`
        <label>${icon} ${dl.label}</label>
        <input type="date" id="${inputId}" value="${dl.date||''}">
        <button data-key="${dl.key}" data-field="${dl.field}">設定</button>
      `;
      // チェックボックス
      const checkField=dl.type==="report"?"report":"seikyusho";
      const cst=statusData[dl.key]||{};
      const checked=!!cst[checkField];
      const checkRow=document.createElement("div");
      checkRow.className="status-check"+(checked?" checked":"");
      const cid=`chk-${dl.key}-${checkField}`.replace(/[^a-zA-Z0-9-]/g,"_");
      checkRow.innerHTML=`<input type="checkbox" id="${cid}" ${checked?"checked":""}><label for="${cid}">完了</label>${checked?'<span style="font-size:11px;color:var(--accent);">✓ 完了</span>':""}`;
      checkRow.querySelector("input").addEventListener("change",e=>{
        const val=e.target.checked;
        if(!statusData[dl.key])statusData[dl.key]={};
        statusData[dl.key][checkField]=val;
        checkRow.className="status-check"+(val?" checked":"");
        const sp=checkRow.querySelector("span");

        if(val){const s=document.createElement("span");s.style.cssText="font-size:11px;color:var(--accent);";s.textContent="✓ 完了";checkRow.appendChild(s);}
        setStatus(dl.key,checkField,val);
      });
      pickerDiv.querySelector("button").addEventListener("click",e=>{
        const k=e.target.dataset.key;
        const f=e.target.dataset.field;
        const val=document.getElementById(`date-${f}-${k.replace(/[^a-zA-Z0-9]/g,'_')}`).value;
        if(!val)return;
        if(!statusData[k])statusData[k]={};
        statusData[k][f]=val;
        saveDate(k,f,val);
        renderCalendar();
        e.target.textContent="✓";
        setTimeout(()=>e.target.textContent="設定",1500);
      });
      campPickerWrap.appendChild(pickerDiv);
      campPickerWrap.appendChild(checkRow);
    });
    div.appendChild(campPickerWrap);

    groups[name].forEach(item=>{
      const key=statusKey(item);
      const st=statusData[key]||{sokuhochi:false,report:false,seikyusho:false};
      const [bg]=mediaColor(item.media);

      const mediaDiv=document.createElement("div");
      mediaDiv.style.cssText="margin-bottom:12px;";
      mediaDiv.innerHTML=`<span class="badge ${mediaBadgeClass(item.media)}" style="margin-bottom:6px;display:inline-block;">${item.media}</span>`;

      // 速報値日付ピッカー（媒体ごと）
      const deadlines = getDeadlines(item);
      const pickerWrap = document.createElement("div");
      pickerWrap.style.cssText="margin-bottom:8px;";
      deadlines.forEach(dl=>{
        const pickerDiv=document.createElement("div");
        pickerDiv.className="sokcho-date-row";
        const inputId=`date-${dl.field}-${key.replace(/[^a-zA-Z0-9]/g,'_')}`;
        pickerDiv.innerHTML=`
          <label>📊 速報値</label>
          <input type="date" id="${inputId}" value="${dl.date||''}">
          <button data-key="${key}" data-field="${dl.field}">設定</button>
        `;
        pickerDiv.querySelector("button").addEventListener("click", e=>{
          const k=e.target.dataset.key;
          const f=e.target.dataset.field;
          const val=document.getElementById(`date-${f}-${k.replace(/[^a-zA-Z0-9]/g,'_')}`).value;
          if(!val) return;
          if(!statusData[k])statusData[k]={};
          statusData[k][f]=val;
          saveDate(k, f, val);

          e.target.textContent="✓";

        cb.addEventListener("change",e=>{
          const val=e.target.checked;
          if(!statusData[key])statusData[key]={sokuhochi:false,report:false,seikyusho:false};
          statusData[key][field]=val;
          row.className="status-check"+(val?" checked":"");
          row.querySelector("label").nextSibling&&row.querySelector("label").nextSibling.remove();
          if(val){
            const span=document.createElement("span");
            span.style.cssText="font-size:11px;color:var(--accent);";
            span.textContent="✓ 完了";
            row.appendChild(span);
          }
          setStatus(key,field,val);
        });
        checks.appendChild(row);
      });

      mediaDiv.appendChild(checks);
      div.appendChild(mediaDiv);
    });

    content.appendChild(div);
  });

  document.getElementById("datePopupOverlay").classList.add("open");
}

function stableId(name,media,start){
  let str=name+"|"+media+"|"+start,hash=0;
  for(let i=0;i<str.length;i++)hash=((hash<<5)-hash+str.charCodeAt(i))|0;
  return"sheet-"+Math.abs(hash);
}
function parseCSVLine(line){
  const result=[];let cur="",inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;continue;}
    if(c===','&&!inQ){result.push(cur);cur="";continue;}
    cur+=c;
  }
  result.push(cur);
  return result.map(s=>s.trim());
}
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  return lines.slice(1).filter(r=>{const c=parseCSVLine(r);return r.trim()&&c[0]&&c[1];}).map(r=>{
    const cols=parseCSVLine(r);
    const name=cols[0],media=cols[1];
    const gross=Number(String(cols[2]).replace(/[^0-9.-]/g,""))||0;
    const feeRate=Number(String(cols[3]).replace(/[^0-9.-]/g,""))||0;
    const budget=Number(String(cols[4]).replace(/[^0-9.-]/g,""))||0;
    const start=parseDate(cols[5]),end=parseDate(cols[6]);
    const startTime=cols[7]||"",endTime=cols[8]||"";
    return{id:stableId(name,media,start),name,media,gross,feeRate,budget,start,end,startTime,endTime,done:false,fromSheet:true};
  });
}
function mergeSheetData(imported){
  const localOnly=data.filter(d=>!d.fromSheet);
  const prevDoneMap={};
  data.forEach(d=>{if(d.fromSheet)prevDoneMap[d.id]=d.done;});
  const merged=imported.map(item=>({...item,done:!!prevDoneMap[item.id]}));
  data=localOnly.concat(merged);
}
function syncFromSheet(showAlert){
  const url=localStorage.getItem(SHEET_URL_KEY);
  if(!url)return;
  fetch(url).then(r=>r.text()).then(text=>{
    mergeSheetData(parseCSV(text));
    saveData();render();
    if(currentView==="cal")renderCalendar();
    setUpdatedAt();
  }).catch(()=>{if(showAlert)alert("読み込みに失敗しました。リンクが正しく公開されているか確認してください。");});
}
function setUpdatedAt(){
  const now=new Date();
  document.getElementById("updatedAt").textContent="最終更新: "+now.toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
}

setUpdatedAt();
loadData();
render();
loadStatus();
if(localStorage.getItem(SHEET_URL_KEY)){
  document.getElementById("refreshSheetBtn").style.display="inline-block";
  syncFromSheet(false);
}
</script>
</body>
</html>
